<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AEG Fuels – Work Tasks</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#1e2d5a;--navy-dark:#152044;--navy-light:#2a3f7a;
    --silver:#8a9ab5;--silver-light:#c8d4e8;
    --bg:#f0f3f8;--surface:#ffffff;--border:#d0d9e8;--border-hover:#8a9ab5;
    --text:#1a2240;--text-muted:#5a6a88;--text-hint:#9aaabb;
    --radius:10px;--radius-sm:6px;
  }
  @media(prefers-color-scheme:dark){:root{--bg:#0e1422;--surface:#161e30;--border:#243050;--border-hover:#3a4e78;--text:#d8e4f4;--text-muted:#7a90b8;--text-hint:#3a4e6a}}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:15px;line-height:1.5;min-height:100vh}
  .page{max-width:740px;margin:0 auto;padding:0 1.25rem 4rem}
  .header-bar{background:var(--navy-dark);padding:0 1.25rem;margin:0 -1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .header-bar img{height:44px;padding:10px 0;display:block}
  .header-bar .header-right{display:flex;flex-direction:column;align-items:flex-end;padding:10px 0}
  .header-bar .header-title{font-size:15px;font-weight:600;color:#fff;letter-spacing:.02em}
  .header-bar .header-sub{font-size:11px;color:var(--silver-light);opacity:.7;margin-top:1px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.75rem}
  .stat{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:.85rem .75rem;text-align:center}
  .stat-num{font-size:22px;font-weight:700;line-height:1;color:var(--navy)}
  .stat-label{font-size:11px;color:var(--text-muted);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}
  @media(prefers-color-scheme:dark){.stat-num{color:var(--silver-light)}}
  .add-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;margin-bottom:1.5rem}
  .add-card h2{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--navy);margin-bottom:1rem;display:flex;align-items:center;gap:6px}
  .add-card h2::before{content:'';display:inline-block;width:3px;height:14px;background:var(--navy);border-radius:2px}
  @media(prefers-color-scheme:dark){.add-card h2{color:var(--silver-light)}.add-card h2::before{background:var(--silver-light)}}
  .field{margin-bottom:.75rem}
  .field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:4px;font-weight:500}
  .field input,.field select,.field textarea{width:100%;padding:8px 10px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .15s;outline:none}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--navy);box-shadow:0 0 0 2px rgba(30,45,90,.1)}
  .field textarea{resize:vertical;min-height:56px;line-height:1.5}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .btn-add{width:100%;padding:10px 16px;border-radius:var(--radius-sm);border:none;background:var(--navy);color:#fff;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;transition:background .15s;margin-top:.25rem;letter-spacing:.02em}
  .btn-add:hover{background:var(--navy-light)}
  .btn-add:disabled{opacity:.6;cursor:not-allowed}
  .controls{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:.85rem;flex-wrap:wrap}
  .filters{display:flex;gap:6px;flex-wrap:wrap}
  .filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;transition:all .15s;font-weight:500}
  .filter-btn:hover{border-color:var(--navy);color:var(--navy)}
  .filter-btn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .sort-wrap{display:flex;align-items:center;gap:6px;white-space:nowrap}
  .sort-wrap label{font-size:12px;color:var(--text-muted)}
  .sort-wrap select{font-size:12px;padding:5px 8px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);color:var(--text)}
  .task-list{display:flex;flex-direction:column;gap:6px}
  .task-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:.9rem 1rem;display:flex;align-items:flex-start;gap:10px;transition:border-color .15s,box-shadow .15s}
  .task-card:hover{border-color:var(--border-hover);box-shadow:0 2px 8px rgba(30,45,90,.07)}
  .task-card.done{opacity:.5}
  .task-card.done .task-title{text-decoration:line-through;color:var(--text-muted)}
  .task-card.priority-critical{border-left:3px solid #c0392b}
  .task-card.priority-high{border-left:3px solid #d4810a}
  .task-card.priority-medium{border-left:3px solid var(--navy)}
  .task-card.priority-low{border-left:3px solid #2e7d32}
  .check-btn{width:20px;height:20px;flex-shrink:0;border-radius:50%;border:1.5px solid var(--border-hover);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
  .check-btn.checked{background:var(--navy);border-color:var(--navy)}
  .check-btn svg{display:none;width:10px;height:10px}
  .check-btn.checked svg{display:block}
  .task-body{flex:1;min-width:0}
  .task-title{font-size:15px;font-weight:500;margin-bottom:3px;word-break:break-word;color:var(--text)}
  .task-note{font-size:13px;color:var(--text-muted);margin-bottom:6px;word-break:break-word}
  .task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:4px;letter-spacing:.02em}
  .p-critical{background:#fde8e6;color:#a32020}
  .p-high{background:#fef3e0;color:#7a4a00}
  .p-medium{background:#e8eef8;color:#1e2d5a}
  .p-low{background:#e8f4e8;color:#1a5c1a}
  .due-overdue{background:#fde8e6;color:#a32020}
  .due-today{background:#fef3e0;color:#7a4a00}
  .due-soon{background:#e8eef8;color:#1e2d5a}
  .due-later{background:#edf0f6;color:#4a5a78}
  .due-none{background:#edf0f6;color:#7a8a9a}
  @media(prefers-color-scheme:dark){
    .p-critical{background:#3a1010;color:#f09595}.p-high{background:#3a2a08;color:#fac775}
    .p-medium{background:#0c1e40;color:#85b7eb}.p-low{background:#0e2e0e;color:#80c880}
    .due-overdue{background:#3a1010;color:#f09595}.due-today{background:#3a2a08;color:#fac775}
    .due-soon{background:#0c1e40;color:#85b7eb}.due-later{background:#1a2238;color:#7a8aaa}
    .due-none{background:#1a2238;color:#5a6a88}
  }
  .del-btn{width:28px;height:28px;flex-shrink:0;border:none;background:transparent;cursor:pointer;border-radius:var(--radius-sm);color:var(--text-hint);display:flex;align-items:center;justify-content:center;transition:all .15s}
  .del-btn:hover{background:var(--bg);color:#c0392b}
  .empty{text-align:center;padding:3rem 1rem;color:var(--text-muted);font-size:14px}
  .empty svg{display:block;margin:0 auto 10px;opacity:.3}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 20px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999}
  .toast.show{opacity:1}
  .sync-bar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted);margin-bottom:1rem}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:#ccc;flex-shrink:0}
  .sync-dot.ok{background:#2e7d32}
  .sync-dot.error{background:#c0392b}
  .sync-dot.loading{background:#d4810a;animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .setup-banner{background:#fffbe6;border:0.5px solid #f0d060;border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;font-size:13px;color:#5a4a00}
  .setup-banner strong{display:block;margin-bottom:4px;font-size:14px}
  .setup-banner input{width:100%;margin-top:8px;padding:7px 10px;border-radius:var(--radius-sm);border:0.5px solid #d0b840;background:#fff;font-size:13px;color:#1a1a00;outline:none}
  .setup-banner button{margin-top:8px;padding:7px 16px;background:var(--navy);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer}
  @media(max-width:500px){.stats{grid-template-columns:repeat(2,1fr)}.form-row{grid-template-columns:1fr}.header-bar img{height:36px}}
</style>
</head>

    <div class="header-right">
      <span class="header-title">Work Tasks</span>
      <span class="header-sub" id="task-count"></span>
    </div>
  </div>

  <div class="setup-banner" id="setup-banner" style="display:none">
    <strong>⚙️ One-time setup: paste your Google Apps Script URL</strong>
    To sync tasks across devices, paste the Web App URL from your Google Apps Script deployment below.
    <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec">
    <button onclick="saveScriptUrl()">Save &amp; Connect</button>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-status">Checking connection...</span>
    <span style="flex:1"></span>
    <button onclick="loadTasks()" style="font-size:11px;padding:3px 10px;border-radius:12px;border:0.5px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer">↻ Refresh</button>
  </div>

  <div class="stats" id="stats-row"></div>

  <div class="add-card">
    <h2>Add task</h2>
    <div class="field">
      <label>Task name</label>
      <input type="text" id="task-title" placeholder="What needs to get done?" maxlength="150" autocomplete="off">
    </div>
    <div class="field">
      <label>Notes (optional)</label>
      <textarea id="task-note" placeholder="Any extra context or details..."></textarea>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Priority</label>
        <select id="task-priority">
          <option value="critical">🔴 Critical</option>
          <option value="high">🟠 High</option>
          <option value="medium" selected>🔵 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="field">
        <label>Due date</label>
        <input type="date" id="task-due">
      </div>
    </div>
    <button class="btn-add" id="add-btn" onclick="addTask()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Add task
    </button>
  </div>

  <div class="controls">
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" onclick="setFilter('critical',this)">Critical</button>
      <button class="filter-btn" onclick="setFilter('high',this)">High</button>
      <button class="filter-btn" onclick="setFilter('medium',this)">Medium</button>
      <button class="filter-btn" onclick="setFilter('low',this)">Low</button>
      <button class="filter-btn" onclick="setFilter('overdue',this)">Overdue</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Done</button>
    </div>
    <div class="sort-wrap">
      <label>Sort</label>
      <select id="sort-select" onchange="render()">
        <option value="priority">Priority</option>
        <option value="due">Due date</option>
        <option value="added">Date added</option>
      </select>
    </div>
  </div>

  <div class="task-list" id="task-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'work_tasks_v1';
const URL_KEY = 'aeg_script_url';
let tasks = [];
let filter = 'all';
let scriptUrl = localStorage.getItem(URL_KEY) || 'https://script.google.com/macros/s/AKfycbwXX4SzyojvQVesmS4ODx1dPxTPNii2AWfOrBCnCDqE47b3PYw11VjmrbBlX1xRUuo_JQ/exec';

function saveScriptUrl() {
  const val = document.getElementById('script-url-input').value.trim();
  if (!val.startsWith('https://script.google.com')) { showToast('Invalid URL — must start with https://script.google.com'); return; }
  scriptUrl = val;
  localStorage.setItem(URL_KEY, scriptUrl);
  document.getElementById('setup-banner').style.display = 'none';
  showToast('Connected! Loading tasks...');
  loadTasks();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-status');
  dot.className = 'sync-dot ' + state;
  txt.textContent = msg;
}

async function loadTasks() {
  if (!scriptUrl) {
    
    setSyncStatus('error', 'Not connected — paste your script URL above');
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) tasks = JSON.parse(saved);
    render(); return;
  }
  setSyncStatus('loading', 'Syncing...');
  try {
    const res = await fetch(scriptUrl + '?action=get', {redirect:'follow'});
    const data = await res.json();
    tasks = data.tasks || [];
    localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    setSyncStatus('ok', 'Synced · ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncStatus('error', 'Sync failed — showing local data');
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) tasks = JSON.parse(saved);
  }
  render();
}

async function addTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { document.getElementById('task-title').focus(); return; }
  const task = {
    id: Date.now().toString(),
    title,
    note: document.getElementById('task-note').value.trim(),
    priority: document.getElementById('task-priority').value,
    due: document.getElementById('task-due').value,
    done: false,
    added: Date.now()
  };
  document.getElementById('task-title').value = '';
  document.getElementById('task-note').value = '';
  document.getElementById('task-priority').value = 'medium';
  document.getElementById('task-due').value = '';
  document.getElementById('task-title').focus();

  if (!scriptUrl) {
    tasks.push(task); localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); render(); return;
  }
  const btn = document.getElementById('add-btn');
  btn.disabled = true; btn.textContent = 'Saving...';
  setSyncStatus('loading', 'Saving...');
  try {
    await fetch(scriptUrl, {method:'POST', body: JSON.stringify({action:'add', task}), redirect:'follow'});
    await loadTasks();
    showToast('Task added!');
  } catch(e) {
    tasks.push(task); localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    setSyncStatus('error', 'Saved locally — sync failed');
    render();
  }
  btn.disabled = false;
  btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg> Add task';
}

async function toggleDone(id) {
  const t = tasks.find(x => x.id == id);
  if (!t) return;
  t.done = !t.done;
  render();
  if (!scriptUrl) { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); return; }
  setSyncStatus('loading', 'Saving...');
  try {
    await fetch(scriptUrl, {method:'POST', body: JSON.stringify({action:'update', task: t}), redirect:'follow'});
    setSyncStatus('ok', 'Synced · ' + new Date().toLocaleTimeString());
  } catch(e) { setSyncStatus('error', 'Sync failed'); }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

async function deleteTask(id) {
  if (!confirm('Delete this task?')) return;
  tasks = tasks.filter(x => x.id != id);
  render();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  if (!scriptUrl) return;
  setSyncStatus('loading', 'Saving...');
  try {
    await fetch(scriptUrl, {method:'POST', body: JSON.stringify({action:'delete', id}), redirect:'follow'});
    setSyncStatus('ok', 'Synced · ' + new Date().toLocaleTimeString());
  } catch(e) { setSyncStatus('error', 'Sync failed'); }
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function today() { return new Date().toISOString().split('T')[0]; }

function dueBadge(due) {
  if (!due) return {cls:'due-none', label:'No due date'};
  const t = today();
  if (due < t) return {cls:'due-overdue', label:'Overdue'};
  if (due === t) return {cls:'due-today', label:'Due today'};
  const days = Math.round((new Date(due) - new Date(t)) / 86400000);
  if (days <= 3) return {cls:'due-soon', label:`Due in ${days}d`};
  const dt = new Date(due + 'T00:00:00');
  return {cls:'due-later', label: dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
}

function priorityOrder(p) { return {critical:0,high:1,medium:2,low:3}[p] ?? 4; }
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function render() {
  const sort = document.getElementById('sort-select').value;
  let list = [...tasks];
  if (filter === 'done') list = list.filter(t => t.done);
  else if (filter === 'overdue') list = list.filter(t => t.due && t.due < today() && !t.done);
  else if (filter !== 'all') list = list.filter(t => t.priority === filter && !t.done);
  else list = list.filter(t => !t.done);

  if (sort === 'priority') list.sort((a,b) => priorityOrder(a.priority) - priorityOrder(b.priority));
  else if (sort === 'due') list.sort((a,b) => { if(!a.due&&!b.due) return 0; if(!a.due) return 1; if(!b.due) return -1; return a.due.localeCompare(b.due); });
  else list.sort((a,b) => b.added - a.added);

  const el = document.getElementById('task-list');
  if (!list.length) {
    const msgs = {done:'No completed tasks yet.',overdue:'Nothing overdue — great!',all:'No tasks yet. Add one above.'};
    el.innerHTML = `<div class="empty"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M9 9h6M9 13h4"/><path d="M8 2v4M16 2v4"/></svg>${msgs[filter]||`No ${filter}-priority tasks.`}</div>`;
  } else {
    el.innerHTML = list.map(t => {
      const db = dueBadge(t.due);
      const pLabel = {critical:'Critical',high:'High',medium:'Medium',low:'Low'}[t.priority];
      return `<div class="task-card priority-${t.priority}${t.done?' done':''}">
        <button class="check-btn${t.done?' checked':''}" onclick="toggleDone('${t.id}')" aria-label="${t.done?'Mark incomplete':'Mark complete'}">
          <svg viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.note?`<div class="task-note">${escHtml(t.note)}</div>`:''}
          <div class="task-meta">
            <span class="badge p-${t.priority}">${pLabel}</span>
            <span class="badge ${db.cls}"><svg width="10" height="10" viewBox="0 0 14 14" fill="none" style="vertical-align:-1px;margin-right:3px"><rect x="1" y="3" width="12" height="10" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M5 1v3M9 1v3M1 7h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>${db.label}</span>
          </div>
        </div>
        <button class="del-btn" onclick="deleteTask('${t.id}')" aria-label="Delete task">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 3.5h10M5.5 3.5V2.5h3v1M5 3.5l.5 8M9 3.5l-.5 8" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
        </button>
      </div>`;
    }).join('');
  }

  const total = tasks.filter(t => !t.done).length;
  const overdue = tasks.filter(t => t.due && t.due < today() && !t.done).length;
  const done = tasks.filter(t => t.done).length;
  const critical = tasks.filter(t => t.priority === 'critical' && !t.done).length;
  document.getElementById('task-count').textContent = `${total} open task${total!==1?'s':''}`;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Open</div></div>
    <div class="stat"><div class="stat-num" style="color:#c0392b">${critical}</div><div class="stat-label">Critical</div></div>
    <div class="stat"><div class="stat-num" style="color:#c0392b">${overdue}</div><div class="stat-label">Overdue</div></div>
    <div class="stat"><div class="stat-num" style="color:#1e6b1e">${done}</div><div class="stat-label">Done</div></div>`;
}

document.getElementById('task-title').addEventListener('keydown', e => { if(e.key==='Enter') addTask(); });
loadTasks();
</script>
</body>
</html>
