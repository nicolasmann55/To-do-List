
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
.wrap{padding:1.5rem 0}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
.header h1{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.header span{font-size:13px;color:var(--color-text-secondary)}
.add-form{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.5rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.field label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-size:14px}
.field textarea{resize:vertical;min-height:60px}
.btn-add{width:100%;font-size:14px;padding:8px;cursor:pointer;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);transition:background .15s}
.btn-add:hover{background:var(--color-background-secondary)}
.filters{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.filter-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-secondary)}
.task-list{display:flex;flex-direction:column;gap:8px}
.task-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s}
.task-card:hover{border-color:var(--color-border-secondary)}
.task-card.done{opacity:.55}
.task-card.done .task-title{text-decoration:line-through;color:var(--color-text-secondary)}
.task-left{display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:2px}
.check-btn{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--color-border-secondary);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.check-btn.checked{background:#1D9E75;border-color:#1D9E75}
.check-btn i{font-size:12px;color:white;display:none}
.check-btn.checked i{display:block}
.task-body{flex:1;min-width:0}
.task-title{font-size:15px;font-weight:500;color:var(--color-text-primary);margin-bottom:4px;word-break:break-word}
.task-note{font-size:13px;color:var(--color-text-secondary);margin-bottom:6px;word-break:break-word}
.task-meta{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;font-weight:500;padding:3px 8px;border-radius:4px;letter-spacing:.02em}
.badge.p-critical{background:#FAECE7;color:#993C1D}
.badge.p-high{background:#FAEEDA;color:#854F0B}
.badge.p-medium{background:#E6F1FB;color:#185FA5}
.badge.p-low{background:#EAF3DE;color:#3B6D11}
.badge.due-overdue{background:#FCEBEB;color:#A32D2D}
.badge.due-today{background:#FAEEDA;color:#854F0B}
.badge.due-soon{background:#E6F1FB;color:#185FA5}
.badge.due-later{background:#F1EFE8;color:#5F5E5A}
.badge.due-none{background:#F1EFE8;color:#5F5E5A}
.task-actions{display:flex;gap:4px;align-items:flex-start}
.icon-btn{width:28px;height:28px;border:none;background:transparent;cursor:pointer;border-radius:var(--border-radius-md);color:var(--color-text-secondary);display:flex;align-items:center;justify-content:center;transition:background .15s}
.icon-btn:hover{background:var(--color-background-secondary);color:var(--color-text-primary)}
.empty{text-align:center;padding:2.5rem;color:var(--color-text-secondary);font-size:14px}
.empty i{font-size:32px;display:block;margin-bottom:8px;opacity:.4}
.sort-wrap{display:flex;align-items:center;gap:8px;margin-bottom:1rem}
.sort-wrap label{font-size:12px;color:var(--color-text-secondary)}
.sort-wrap select{font-size:12px;padding:4px 8px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.5rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:.75rem;text-align:center}
.stat-num{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-label{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
</style>

<div class="wrap">
  <h2 class="sr-only">Work task manager — add, prioritize, and track your tasks</h2>
  <div class="header">
    <h1>Work tasks</h1>
    <span id="task-count"></span>
  </div>

  <div class="stats-row" id="stats-row"></div>

  <div class="add-form">
    <div class="form-row">
      <div class="field" style="grid-column:1/-1">
        <label>Task name</label>
        <input type="text" id="task-title" placeholder="What needs to get done?" maxlength="120">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Notes (optional)</label>
        <textarea id="task-note" placeholder="Any extra context..."></textarea>
      </div>
      <div class="field" style="display:flex;flex-direction:column;gap:10px">
        <div>
          <label>Priority</label>
          <select id="task-priority">
            <option value="critical">🔴 Critical</option>
            <option value="high">🟠 High</option>
            <option value="medium" selected>🔵 Medium</option>
            <option value="low">🟢 Low</option>
          </select>
        </div>
        <div>
          <label>Due date</label>
          <input type="date" id="task-due">
        </div>
      </div>
    </div>
    <button class="btn-add" onclick="addTask()"><i class="ti ti-plus" aria-hidden="true"></i> Add task</button>
  </div>

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:8px">
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="filter-btn" data-filter="critical" onclick="setFilter('critical',this)">Critical</button>
      <button class="filter-btn" data-filter="high" onclick="setFilter('high',this)">High</button>
      <button class="filter-btn" data-filter="medium" onclick="setFilter('medium',this)">Medium</button>
      <button class="filter-btn" data-filter="low" onclick="setFilter('low',this)">Low</button>
      <button class="filter-btn" data-filter="overdue" onclick="setFilter('overdue',this)">Overdue</button>
      <button class="filter-btn" data-filter="done" onclick="setFilter('done',this)">Done</button>
    </div>
    <div class="sort-wrap">
      <label>Sort by</label>
      <select id="sort-select" onchange="render()">
        <option value="priority">Priority</option>
        <option value="due">Due date</option>
        <option value="added">Date added</option>
      </select>
    </div>
  </div>

  <div class="task-list" id="task-list"></div>
</div>

<script>
const STORAGE_KEY = 'work_tasks_v2';
let tasks = [];
let filter = 'all';

async function load() {
  try {
    const r = await window.storage.get(STORAGE_KEY);
    if (r && r.value) tasks = JSON.parse(r.value);
  } catch(e) { tasks = []; }
  render();
}

async function save() {
  try { await window.storage.set(STORAGE_KEY, JSON.stringify(tasks)); } catch(e){}
}

function today() { return new Date().toISOString().split('T')[0]; }

function dueBadge(due) {
  if (!due) return {cls:'due-none', label:'No due date'};
  const t = today(), d = due;
  if (d < t) return {cls:'due-overdue', label:'Overdue'};
  if (d === t) return {cls:'due-today', label:'Due today'};
  const days = Math.round((new Date(d)-new Date(t))/(1000*86400));
  if (days <= 3) return {cls:'due-soon', label:`Due in ${days}d`};
  return {cls:'due-later', label:due};
}

function priorityOrder(p) { return {critical:0,high:1,medium:2,low:3}[p]??4; }

function addTask() {
  const title = document.getElementById('task-title').value.trim();
  if (!title) { document.getElementById('task-title').focus(); return; }
  tasks.push({
    id: Date.now(),
    title,
    note: document.getElementById('task-note').value.trim(),
    priority: document.getElementById('task-priority').value,
    due: document.getElementById('task-due').value,
    done: false,
    added: Date.now()
  });
  document.getElementById('task-title').value='';
  document.getElementById('task-note').value='';
  document.getElementById('task-priority').value='medium';
  document.getElementById('task-due').value='';
  save(); render();
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function toggleDone(id) {
  const t = tasks.find(x=>x.id===id);
  if(t) t.done = !t.done;
  save(); render();
}

function deleteTask(id) {
  tasks = tasks.filter(x=>x.id!==id);
  save(); render();
}

function render() {
  const sort = document.getElementById('sort-select').value;
  let list = [...tasks];

  if (filter==='done') list = list.filter(t=>t.done);
  else if (filter==='overdue') list = list.filter(t=>t.due && t.due < today() && !t.done);
  else if (filter!=='all') list = list.filter(t=>t.priority===filter && !t.done);
  else list = list.filter(t=>!t.done);

  if (sort==='priority') list.sort((a,b)=>priorityOrder(a.priority)-priorityOrder(b.priority));
  else if (sort==='due') list.sort((a,b)=>{
    if(!a.due && !b.due) return 0;
    if(!a.due) return 1; if(!b.due) return -1;
    return a.due.localeCompare(b.due);
  });
  else list.sort((a,b)=>b.added-a.added);

  const el = document.getElementById('task-list');
  if (!list.length) {
    el.innerHTML = `<div class="empty"><i class="ti ti-checklist" aria-hidden="true"></i>${filter==='done'?'No completed tasks yet.':filter==='overdue'?'Nothing overdue — nice!':'No tasks here. Add one above.'}</div>`;
  } else {
    el.innerHTML = list.map(t=>{
      const db = dueBadge(t.due);
      const pLabel = {critical:'Critical',high:'High',medium:'Medium',low:'Low'}[t.priority];
      return `<div class="task-card${t.done?' done':''}">
        <div class="task-left">
          <button class="check-btn${t.done?' checked':''}" onclick="toggleDone(${t.id})" aria-label="${t.done?'Mark incomplete':'Mark complete'}">
            <i class="ti ti-check" aria-hidden="true"></i>
          </button>
        </div>
        <div class="task-body">
          <div class="task-title">${escHtml(t.title)}</div>
          ${t.note?`<div class="task-note">${escHtml(t.note)}</div>`:''}
          <div class="task-meta">
            <span class="badge p-${t.priority}">${pLabel}</span>
            <span class="badge ${db.cls}"><i class="ti ti-calendar" style="font-size:11px;vertical-align:-1px;margin-right:3px" aria-hidden="true"></i>${db.label}</span>
          </div>
        </div>
        <div class="task-actions">
          <button class="icon-btn" onclick="deleteTask(${t.id})" aria-label="Delete task"><i class="ti ti-trash" aria-hidden="true"></i></button>
        </div>
      </div>`;
    }).join('');
  }

  const total = tasks.filter(t=>!t.done).length;
  const overdue = tasks.filter(t=>t.due && t.due<today() && !t.done).length;
  const done = tasks.filter(t=>t.done).length;
  const critical = tasks.filter(t=>t.priority==='critical' && !t.done).length;
  document.getElementById('task-count').textContent = `${total} open task${total!==1?'s':''}`;
  document.getElementById('stats-row').innerHTML = `
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-label">Open</div></div>
    <div class="stat"><div class="stat-num" style="color:#993C1D">${critical}</div><div class="stat-label">Critical</div></div>
    <div class="stat"><div class="stat-num" style="color:#A32D2D">${overdue}</div><div class="stat-label">Overdue</div></div>
    <div class="stat"><div class="stat-num" style="color:#1D9E75">${done}</div><div class="stat-label">Done</div></div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

document.getElementById('task-title').addEventListener('keydown', e=>{ if(e.key==='Enter') addTask(); });
load();
</script>
